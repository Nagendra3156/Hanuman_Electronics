        display: flex;

        position: relative;
    }

    .hero::after {
        content: "";

    }

    /* Products Grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    }

    .card {
        background: white;

        overflow: hidden;
